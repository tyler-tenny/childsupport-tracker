<div class="container">
  <button class="back-btn" (click)="goBack()">← Back to Cases</button>

  <div *ngIf="loading">Loading...</div>

  <div *ngIf="!loading && case">
    <div class="case-header">
      <div>
        <h1>{{ case.caseNumber }}</h1>
        <span class="badge" [class]="'badge-' + case.status.toLowerCase()">
          {{ case.status }}
        </span>
        <span class="case-type">{{ case.caseType }}</span>
      </div>
    </div>

    <div class="section">
      <h2>Payment History</h2>
      <div *ngIf="payments.length === 0" class="empty">No payments recorded.</div>
      <table *ngIf="payments.length > 0">
        <thead>
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let p of payments">
          <td>{{ p.paymentDate }}</td>
          <td>${{ p.amount }}</td>
          <td>
              <span class="badge" [class]="'badge-' + p.status.toLowerCase()">
                {{ p.status }}
              </span>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="section">
      <h2>Log a Payment</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Amount</label>
          <input type="number" [(ngModel)]="newPayment.amount" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" [(ngModel)]="newPayment.paymentDate" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="newPayment.status">
            <option value="RECEIVED">Received</option>
            <option value="PENDING">Pending</option>
            <option value="MISSED">Missed</option>
          </select>
        </div>
        <button (click)="logPayment()">Log Payment</button>
      </div>
    </div>
  </div>
</div>
